name: PR Review (Reusable)

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model for small PRs (below large_pr_threshold)"
        type: string
        default: "claude-haiku-4-5"
      model_large:
        description: "Claude model for large PRs (>= large_pr_threshold). Used for deeper analysis."
        type: string
        default: "claude-sonnet-4-6"
      large_pr_threshold:
        description: "PRs with at least this many changed lines (additions+deletions) get the larger model and higher turn budget."
        type: number
        default: 100
      max_turns:
        description: "Max agent turns for small PRs"
        type: number
        default: 15
      max_turns_large:
        description: "Max agent turns for large PRs"
        type: number
        default: 30
      min_lines:
        description: "Skip PRs smaller than this many lines (additions+deletions). Bypassed by `needs-review` label."
        type: number
        default: 15

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CLAUDE_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Get PR info from workflow_run
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;

            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${headBranch}`,
              state: 'open',
            });

            if (pulls.data.length === 0) {
              core.warning(`No open PR found for branch ${headBranch}`);
              core.setOutput('found', 'false');
              return;
            }

            const pr = pulls.data[0];
            core.setOutput('found', 'true');
            core.setOutput('number', pr.number);
            core.setOutput('title', pr.title);
            core.setOutput('body', pr.body || '');
            core.setOutput('author', pr.user.login);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', headSha);

      - name: Skip if no PR found
        if: steps.pr.outputs.found != 'true'
        run: echo "No open PR found — skipping review."

      - name: Decide whether to review
        id: decide
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          MIN_LINES: ${{ inputs.min_lines }}
          LARGE_THRESHOLD: ${{ inputs.large_pr_threshold }}
          MODEL_SMALL: ${{ inputs.model }}
          MODEL_LARGE: ${{ inputs.model_large }}
          MAX_TURNS_SMALL: ${{ inputs.max_turns }}
          MAX_TURNS_LARGE: ${{ inputs.max_turns_large }}
        run: |
          set -euo pipefail

          # Always read PR labels first — they can override every other filter.
          STATS=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
                    --json additions,deletions,isDraft,files,labels)

          TOTAL=$(jq -r '.additions + .deletions' <<<"$STATS")

          # Pick model + turn budget based on PR size. Tiny + skip filters below
          # may still bail out, but these outputs are emitted unconditionally so
          # the run step can read them without branching.
          if [ "$TOTAL" -ge "$LARGE_THRESHOLD" ]; then
            echo "chosen_model=$MODEL_LARGE" >> "$GITHUB_OUTPUT"
            echo "chosen_max_turns=$MAX_TURNS_LARGE" >> "$GITHUB_OUTPUT"
            echo "size_tier=large" >> "$GITHUB_OUTPUT"
          else
            echo "chosen_model=$MODEL_SMALL" >> "$GITHUB_OUTPUT"
            echo "chosen_max_turns=$MAX_TURNS_SMALL" >> "$GITHUB_OUTPUT"
            echo "size_tier=small" >> "$GITHUB_OUTPUT"
          fi

          # `needs-review` label: force review even on bots / tiny / docs-only PRs.
          FORCE=$(jq -r '.labels | map(.name) | index("needs-review") // empty' <<<"$STATS")
          if [ -n "$FORCE" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "reason=forced via needs-review label" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # `skip-review` label: explicit opt-out.
          SKIP_LBL=$(jq -r '.labels | map(.name) | index("skip-review") // empty' <<<"$STATS")
          if [ -n "$SKIP_LBL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=skip-review label" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip bot authors (dependabot, renovate, anything ending in [bot]).
          case "$PR_AUTHOR" in
            dependabot*|renovate*|*\[bot\])
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=bot author ($PR_AUTHOR)" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          DRAFT=$(jq -r '.isDraft' <<<"$STATS")

          if [ "$DRAFT" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=draft PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$TOTAL" -lt "$MIN_LINES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=tiny PR ($TOTAL lines, threshold $MIN_LINES)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if every changed file is docs/lock/config-only
          NON_TRIVIAL=$(jq -r '.files | map(.path) |
            map(select(test("\\.(md|lock|json|yml|yaml|txt)$") | not)) | length' <<<"$STATS")
          if [ "$NON_TRIVIAL" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=docs/lock/config only" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "reason=eligible" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.pr.outputs.found == 'true' && steps.decide.outputs.skip == 'true'
        env:
          REASON: ${{ steps.decide.outputs.reason }}
        run: echo "::notice::Skipping Claude review — $REASON"

      - name: Checkout PR code
        if: steps.pr.outputs.found == 'true' && steps.decide.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      # Workaround for anthropics/claude-code-action#1290 — claude-code
      # 2.1.129 (published 2026-05-05) regressed its install logic so the
      # binary never lands at ~/.local/bin/claude. claude-code-action@v1
      # always pulls the latest, so pinning the action wouldn't help; we
      # pre-install a known-good version (2.1.128) and pass the binary
      # path to the action so it skips its own broken install. Once the
      # upstream fix lands (2.1.130+) this step + the
      # `path_to_claude_code_executable` input below can be removed.
      #
      # Uses the runner-image Node (20+ pre-installed on ubuntu-latest)
      # so we don't pull in `actions/setup-node` — that action's
      # `package-manager-cache: true` default sniffs the checked-out
      # repo for pnpm and dies if pnpm isn't on PATH.
      - name: Pre-install Claude Code 2.1.128 (workaround for upstream #1290)
        id: claude-bin
        if: steps.pr.outputs.found == 'true' && steps.decide.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Install to the user prefix so we don't need sudo and so the
          # binary lands in a stable, predictable location regardless of
          # the runner's global npm prefix.
          mkdir -p "$HOME/.npm-global"
          npm config set prefix "$HOME/.npm-global"
          npm install -g @anthropic-ai/claude-code@2.1.128
          BIN="$HOME/.npm-global/bin/claude"
          if [ ! -x "$BIN" ]; then
            echo "::error::claude binary not found at $BIN after npm install"
            ls -la "$HOME/.npm-global/bin/" || true
            exit 1
          fi
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          "$BIN" --version

      - name: Run Claude review
        if: steps.pr.outputs.found == 'true' && steps.decide.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_BASE: ${{ steps.pr.outputs.base_ref }}
          PR_HEAD: ${{ steps.pr.outputs.head_ref }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.claude-bin.outputs.path }}
          allowed_bots: "claude-sfmbbrand"
          claude_args: "--model ${{ steps.decide.outputs.chosen_model }} --max-turns ${{ steps.decide.outputs.chosen_max_turns }} --allowedTools Read,Glob,Grep,Bash"
          prompt: |
            You are an automated code reviewer for the ErosGuia International platform.

            ## Context
            - Repository: ${{ github.repository }}
            - PR #${{ steps.pr.outputs.number }}: ${{ steps.pr.outputs.title }}
            - Author: ${{ steps.pr.outputs.author }}
            - Base: ${{ steps.pr.outputs.base_ref }} ← Head: ${{ steps.pr.outputs.head_ref }}

            ## Instructions

            1. Get the full diff:
               ```
               gh pr diff ${{ steps.pr.outputs.number }}
               ```

            2. Read any changed files that need deeper inspection (use Read/Glob/Grep tools).

            3. If the repo has a CLAUDE.md file, read it to understand project conventions.

            4. Classify findings into two buckets:

               **Blocking** (set verdict to `REQUEST_CHANGES`):
               - Security vulnerabilities (SQL injection, XSS, exposed secrets/credentials)
               - Broken logic or bugs that would cause runtime errors
               - Data loss risk (missing validation at system boundaries, destructive operations without safeguards)
               - Missing critical error handling at system boundaries

               **Non-blocking** (do NOT change the verdict, but MUST appear in the summary):
               - Style preferences, naming suggestions
               - Minor refactoring opportunities
               - Documentation improvements
               - Performance optimizations that aren't critical
               - Edge cases worth handling defensively

            5. **Write your verdict and summary.** Both files are mandatory.

               When verdict is APPROVE, the summary MUST include:
               - A short "What this PR does" section (2-4 bullets)
               - A "Non-blocking observations" section with **2-4 specific suggestions** for improvement
                 (style, refactor, perf, docs, edge cases) referencing file paths or line numbers when possible.
                 Only write "None — change is minimal" if the diff is genuinely trivial (≤ 10 changed lines, e.g. a typo fix, version bump, or single-line CSS tweak). For anything bigger, finding zero observations is rare — look harder before defaulting to "None".

               Use these exact bash commands.

               APPROVE example:
               ```bash
               echo "APPROVE" > /tmp/review-verdict.txt
               cat > /tmp/review-summary.md << 'SUMMARY'
               ## Verdict: APPROVE — no blocking issues found

               ### What this PR does
               - <bullet 1>
               - <bullet 2>

               ### Non-blocking observations
               1. **<short title>** — <description, with `path/file.ext:LN` if applicable>
               2. **<short title>** — <description>
               SUMMARY
               ```

               REQUEST_CHANGES example:
               ```bash
               echo "REQUEST_CHANGES" > /tmp/review-verdict.txt
               cat > /tmp/review-summary.md << 'SUMMARY'
               ## Verdict: REQUEST_CHANGES

               ### Blocking issues
               1. **<short title>** — <description, file:line>

               ### Non-blocking observations
               <optional, same format as above>
               SUMMARY
               ```

            IMPORTANT: You MUST write both /tmp/review-verdict.txt and /tmp/review-summary.md. Do not skip this step.

      - name: Approve and merge
        if: steps.pr.outputs.found == 'true' && steps.decide.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUM: ${{ steps.pr.outputs.number }}
        run: |
          VERDICT=$(cat /tmp/review-verdict.txt 2>/dev/null || echo "UNKNOWN")
          SUMMARY=$(cat /tmp/review-summary.md 2>/dev/null || echo "Automated review completed.")

          echo "Verdict: $VERDICT"

          if [ "$VERDICT" = "APPROVE" ]; then
            echo "Approving PR #$PR_NUM..."
            if gh pr review "$PR_NUM" --approve --body "$SUMMARY"; then
              echo "Approved!"
              echo "Merging PR #$PR_NUM..."
              gh pr merge "$PR_NUM" --squash --auto && echo "Merge initiated!" || echo "::warning::Could not enable auto-merge"
            else
              echo "::warning::Could not approve — likely self-review (PR opened by the same bot). Falling back to comment."
              FALLBACK_NOTE=$'\n\n---\n> :warning: **Automated review could not approve this PR.** GitHub blocks self-reviews, so when a PR is opened by the same bot that runs the review workflow, the review is posted as a comment instead. A human reviewer must approve manually to unblock auto-merge.'
              gh pr comment "$PR_NUM" --body "${SUMMARY}${FALLBACK_NOTE}"
            fi
          elif [ "$VERDICT" = "REQUEST_CHANGES" ]; then
            echo "Requesting changes on PR #$PR_NUM..."
            gh pr review "$PR_NUM" --request-changes --body "$SUMMARY"
          else
            echo "::warning::Unknown verdict: $VERDICT — skipping approve/merge"
          fi
